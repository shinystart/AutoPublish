name: Publish on Branch Creation

on:
  create:
    branches:
      - 'feature/project-v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from branch name
        id: version
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          VERSION=$(echo "$BRANCH_NAME" | grep -oP 'v\K[\d]+\.[\d]+\.[\d]+')
          echo "::notice::Branch version: $VERSION"
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ./SimpleConsoleApp/SimpleConsoleApp.csproj

      - name: Build
        run: dotnet build ./SimpleConsoleApp/SimpleConsoleApp.csproj --no-restore -c Release

      - name: Publish
        run: dotnet publish ./SimpleConsoleApp/SimpleConsoleApp.csproj -c Release -o ./publish /p:Version=${{ steps.version.outputs.version }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: publish-${{ steps.version.outputs.version }}
          path: ./publish